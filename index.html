  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

  select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:8px 14px;cursor:pointer;color:var(--ink)}
  .seg button.active{background:var(--accent);color:#fff}
  .bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:6px}
  .bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;
        box-shadow:0 1px 2px rgba(16,24,40,.04)}
  .tag{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
       color:var(--accent);background:#eff4ff;border-radius:6px;padding:3px 8px;margin-bottom:12px}
  a.tag{text-decoration:none;cursor:pointer;transition:background .15s}
  a.tag:hover{background:#dbe6ff}
  .task{font-size:13px;color:var(--muted);margin-bottom:10px}
  .prompt{font-size:18px;margin:0 0 6px}
  .prompt u{text-decoration-thickness:2px;text-underline-offset:3px}
  .hint{font-size:15px;color:var(--muted)}
  .hint b{color:var(--ink)}
  .answer-given{font-size:15px;color:var(--muted);margin-top:6px}
  input[type=text]{width:100%;padding:12px 14px;font-size:17px;border:1px solid var(--line);
        border-radius:10px;margin-top:16px;outline:none}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  .row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
  .btn{padding:11px 18px;border:0;border-radius:10px;background:var(--accent);color:#fff;
       font-weight:600;cursor:pointer}
  .btn.sec{background:#eef1f6;color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  .fb{margin-top:16px;padding:14px;border-radius:10px;font-size:15px;display:none}
  .fb.show{display:block}
  .fb.ok{background:var(--okbg);border:1px solid #b7f0c8}
  .fb.bad{background:var(--badbg);border:1px solid #f5c2c2}
  .fb .lab{font-weight:700;margin-bottom:4px}
  .fb .corr{font-size:16px}
  .fb .note{font-size:12px;color:var(--muted);margin-top:8px}
  .fb .expl{font-size:14px;color:var(--ink);margin-top:10px;background:#f6f8fc;
            border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .fb .expl b{color:var(--accent)}
  .done{text-align:center;padding:40px 10px}
  .done .big{font-size:40px;font-weight:700}
  .fill{font-size:18px;line-height:2.1;margin:16px 0 4px}
  .blank{font:inherit;font-size:17px;padding:3px 8px;border:0;border-bottom:2px solid var(--accent);
         background:#f3f6fd;border-radius:6px 6px 0 0;outline:none;min-width:60px;text-align:center}
  .blank:focus{background:#e7eefc}
  .blank.b-ok{border-bottom-color:var(--ok);background:var(--okbg);color:var(--ok)}
  .blank.b-bad{border-bottom-color:var(--bad);background:var(--badbg);color:var(--bad)}

</head>

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function underline(sentence, frag){
  if(!frag) return esc(sentence);
  const i = sentence.indexOf(frag);
  if(i<0) return esc(sentence);
  return esc(sentence.slice(0,i)) + '<u>' + esc(frag) + '</u>' + esc(sentence.slice(i+frag.length));
}
function norm(str){
  return str.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/ł/g,'l')
    .replace(/[.,…?!„""'\/–-]/g,' ')
    .replace(/\s+/g,' ').trim();
}
function isCorrect(input, answers){
  const n = norm(input);
  if(!n) return false;
  return answers.some(a=>norm(a)===n);
}
function normWord(s){
  return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/ł/g,'l');
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
/* tnie tekst na słowa i separatory */
function tokenize(str){
  const out=[]; const re=/[\p{L}\p{N}]+/gu; let last=0,m;
  while((m=re.exec(str))){
    if(m.index>last) out.push({w:false,text:str.slice(last,m.index)});
    out.push({w:true,text:m[0]});
    last=m.index+m[0].length;
  }
  if(last<str.length) out.push({w:false,text:str.slice(last)});
  return out;
}
/* segmenty zdania-odpowiedzi: słowa zmienione względem oryginału = luki */
function blankSegments(orig, ans){
  const aTok = tokenize(ans);
  const oWords = tokenize(orig).filter(t=>t.w).map(t=>normWord(t.text));
  const aWords = aTok.filter(t=>t.w).map(t=>normWord(t.text));
  const n=oWords.length, m=aWords.length;
  const dp=Array.from({length:n+1},()=>new Array(m+1).fill(0));
  for(let i=1;i<=n;i++)for(let j=1;j<=m;j++)
    dp[i][j]= oWords[i-1]===aWords[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  const matched=new Set(); let i=n,j=m;
  while(i>0&&j>0){
    if(oWords[i-1]===aWords[j-1]){ matched.add(j-1); i--;j--; }
    else if(dp[i-1][j]>=dp[i][j-1]) i--; else j--;
  }
  let wi=-1; const segs=[];
  for(const t of aTok){
    if(t.w){ wi++; segs.push(matched.has(wi) ? {blank:false,text:t.text} : {blank:true,ans:t.text}); }
    else segs.push({blank:false,text:t.text});
  }
  if(!segs.some(s=>s.blank)) segs.forEach(s=>{ if(s.text===undefined){} }); // fallback: nigdy puste
  return segs;
}

/* ---- pełny stan przebiegu ---- */
function curSig(){ return sessionSel.value+'|'+filterType+'|'+(shuffleChk.checked?1:0); }
function materialize(order){
  return order.filter(o=>DATA[o.s]&&DATA[o.s][o.t]&&DATA[o.s][o.t][o.i])
              .map(o=>({session:o.s,type:o.t,idx:o.i,item:DATA[o.s][o.t][o.i]}));
}
function persistRun(){
  if(!state.run) return;
  state.run.pos=pos; state.run.correct=correct; state.run.answered=answered;
  saveState();
}

function build(){
  const sess = sessionSel.value===ALL ? Object.keys(DATA) : [sessionSel.value];
  const order=[];
  sess.forEach(s=>{
    ['V','VI'].forEach(t=>{
      if(filterType!=='both' && filterType!==t) return;
      DATA[s][t].forEach((item,idx)=> order.push({s,t,i:idx}));
    });
  });
  if(shuffleChk.checked) shuffle(order);
  queue = materialize(order);
  pos=0; correct=0; answered=0;
  state.settings = {session:sessionSel.value, type:filterType, shuffle:shuffleChk.checked};
  state.run = {sig:curSig(), order, pos, correct, answered};
  saveState();
  updateMastered();
  render();
}

function updateProgress(){
  $('#prog').style.width = (queue.length? (pos/queue.length*100):0)+'%';
  $('#counter').textContent = queue.length ? `Pytanie ${Math.min(pos+1,queue.length)} z ${queue.length}` : '';
  $('#score').textContent = answered ? `Wynik: ${correct}/${answered}` : '';
}

  updateProgress();
  if(pos>=queue.length){
    stage.innerHTML = `<div class="card done">
      <div class="big">${correct}/${answered}</div>
      <p>Gotowe! ${answered? Math.round(correct/answered*100):0}% poprawnych.</p>
      <button class="btn" onclick="build()">Jeszcze raz</button>
    </div>`;
    return;
  }
  const {session,type,idx,item} = queue[pos];
  const key = itemKey(session,type,idx);
  const prev = state.results[key];
  const doneMark = (prev==='ok'||prev==='ovr') ? ' · ✓' : '';
  const pdf = PDFS[session];
  const page = pdf ? (type==='V'?pdf.V:pdf.VI) : null;
  const tagText = `${session} · zad. ${type}${doneMark}`;
  const tagHtml = pdf
    ? `<a class="tag" href="${pdf.url}#page=${page}" target="_blank" rel="noopener" title="Otwórz arkusz PDF na stronie ${page}">${tagText} ↗</a>`
    : `<span class="tag">${tagText}</span>`;
  let body;
  if(type==='V'){
    body = `<p class="task">Proszę zapytać o <u>podkreśloną</u> część zdania — wpisz słowo pytające.</p>
      <p class="prompt">${underline(item.s, item.u)}</p>
      <p class="hint">– <b>${esc(item.q)}</b></p>
      <p class="answer-given">– ${esc(item.a)}</p>`;
  }else{
    body = `<p class="task">Użyj wyrazu w nawiasie i przekształć zdanie tak, by miało ten sam sens.</p>
      <p class="prompt">${esc(item.s)}</p>
      <p class="hint">wyraz: <b>(${esc(item.w)})</b></p>`;
  }
  stage.innerHTML = `<div class="card">
    ${tagHtml}
    ${body}
    <input type="text" id="inp" autocomplete="off" autocapitalize="off" spellcheck="false"
           placeholder="${type==='V'?'np. Czym':'wpisz całe zdanie'}">
    <div class="fb" id="fb"></div>
    <div class="row">
      <button class="btn" id="checkBtn">Sprawdź</button>
      <button class="btn sec" id="nextBtn" disabled>Następne →</button>
    </div>
  </div>`;
  const inp=$('#inp'), fb=$('#fb'), checkBtn=$('#checkBtn'), nextBtn=$('#nextBtn');
  const blanks=[];
  inp.focus();
  let checked=false;

  function doCheck(){
    if(checked) return;
    checked=true; answered++;
    const ok = isCorrect(inp.value, item.ans);
    if(ok) correct++;
    inp.readOnly=true;
    state.results[key] = ok ? 'ok' : 'bad'; persistRun(); updateMastered();
    const corrTxt = item.ans.join('  /  ') + (type==='V'?'…?':'');
    const userAns = inp.value.trim() || '(brak odpowiedzi)';
    const qClean = (item.q||'').replace(/…+/g,'...');
    const gptPrompt = type==='V'
      ? `Uczę się języka polskiego na poziomie B1. W zdaniu: „${item.s}” mam zapytać o podkreśloną część „${item.u}”. Pełne pytanie: „${qClean}”. Poprawne słowo pytające to „${item.ans[0]}”. Wpisałem(-am): „${userAns}”. Wyjaśnij krótko i prosto, dlaczego poprawna odpowiedź to „${item.ans[0]}” (jaki przypadek lub funkcja składniowa) i dlaczego moja odpowiedź jest błędna. Odpowiedz po angielsku (answer in English).`
      : `Uczę się języka polskiego na poziomie B1. Mam przekształcić zdanie „${item.s}”, używając wyrazu „${item.w}”, zachowując ten sam sens. Poprawna odpowiedź to „${item.ans[0]}”. Napisałem(-am): „${userAns}”. Wyjaśnij krótko i prosto, jaka zmiana gramatyczna jest tu potrzebna (przypadek, przyimek, konstrukcja) i co w mojej odpowiedzi jest źle. Odpowiedz po angielsku (answer in English).`;
    const gptLink = `https://chatgpt.com/?q=${encodeURIComponent(gptPrompt)}`;
    fb.className = 'fb show '+(ok?'ok':'bad');
    fb.innerHTML = `<div class="lab" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'✓ Dobrze!':'✗ Niezupełnie'}</div>
      <div class="corr">Poprawna odpowiedź: <b>${esc(corrTxt)}</b></div>
      ${item.e?`<div class="expl"><b>Dlaczego?</b> ${esc(item.e)}</div>`:''}
      ${type==='VI'?`<div class="note">Akceptowane są też inne poprawne przekształcenia zgodne z poleceniem.</div>`:''}
      ${!ok?`<div class="row" style="margin-top:10px">
        <a class="btn sec" href="${gptLink}" target="_blank" rel="noopener">Wyjaśnij w ChatGPT ↗</a>
        ${type==='VI'?`<button class="btn sec" id="ovr">Uznaj moją odpowiedź za poprawną</button>`:''}
      </div>`:''}`;
    checkBtn.disabled=true; nextBtn.disabled=false; nextBtn.focus();
    const ovr=$('#ovr');
    if(ovr) ovr.onclick=()=>{ if(state.results[key]!=='ovr'){ correct++; } state.results[key]='ovr'; persistRun(); updateMastered(); ovr.disabled=true; ovr.textContent='Zaliczono ✓'; updateProgress(); };
    updateProgress();
  }
  function doNext(){ pos++; render(); }

  checkBtn.onclick=doCheck;
  nextBtn.onclick=doNext;
  const onEnter = e=>{ if(e.key==='Enter'){ e.preventDefault(); checked?doNext():doCheck(); }};
  if(inp) inp.addEventListener('keydown', onEnter);
  blanks.forEach(b=> b.addEventListener('keydown', onEnter));
  document.onkeydown=e=>{ if(e.key==='Enter' && checked && document.activeElement!==inp && !blanks.includes(document.activeElement)){ e.preventDefault(); doNext(); }};
}

sessionSel.onchange=build;
shuffleChk.onchange=build;
typeSeg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
  typeSeg.querySelectorAll('button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); filterType=b.dataset.t; build();
});
$('#resetBtn').onclick=()=>{
  if(confirm('Wyczyścić zapisany postęp (wynik, pozycję i opanowane)?')){
    state.results={}; state.run=null; saveState(); build();
  }
};

/* przywróć ustawienia, a jeśli się da — także pozycję i wynik przebiegu */
(function restore(){
  const st = state.settings || {};
  if(st.session && (st.session===ALL || DATA[st.session])) sessionSel.value = st.session;
  if(st.type==='V' || st.type==='VI' || st.type==='both'){
    filterType = st.type;
    typeSeg.querySelectorAll('button').forEach(b=> b.classList.toggle('active', b.dataset.t===filterType));
  }
  shuffleChk.checked = !!st.shuffle;

  const run = state.run;
  if(run && run.sig===curSig() && Array.isArray(run.order)){
    queue = materialize(run.order);
    if(queue.length===run.order.length && queue.length>0){
      pos = Math.min(Math.max(0, run.pos|0), queue.length);
      correct = run.correct|0; answered = run.answered|0;
      updateMastered();
      render();
      return;
    }
  }
  build();
})();
</script>
</body>
</html>
